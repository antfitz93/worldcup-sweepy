body{font-family:'Barlow Condensed',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.status-dot{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.dot.live{background:var(--live);animation:pulse 1s ease-in-out infinite;}

.tabs{display:flex;}
.tab{padding:8px 16px;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.1em;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.filters{padding:8px 14px 0;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:all .15s;}
.fbtn.active{background:var(--gold);color:#000;border-color:var(--gold);}
.fbtn:hover:not(.active){border-color:var(--gold);color:var(--gold);}

.rbar{display:flex;justify-content:space-between;align-items:center;padding:6px 14px 8px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);}
.rbtn{background:var(--card);border:1px solid var(--border);color:var(--gold);font-family:'DM Mono',monospace;font-size:.65rem;padding:2px 8px;border-radius:4px;cursor:pointer;}
.rbtn:hover{background:var(--border);}
.err{color:#e63946;}

.main{max-width:820px;margin:0 auto;padding:12px 12px 60px;}

.notice{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.18);border-radius:8px;padding:7px 11px;font-size:.72rem;color:#cda93a;margin-bottom:12px;}

.leg-item{display:flex;align-items:center;gap:3px;font-size:.64rem;color:var(--muted);font-weight:600;}
.leg-dot{width:6px;height:6px;border-radius:50%;}

.day-label{font-family:'Bebas Neue',sans-serif;font-size:.92rem;letter-spacing:.1em;}
.day-label.past{color:var(--muted);}

// ── SCORE FETCH ────────────────────────────────────────────────────────────────
async function fetchScores(){
  try{
    if(!PROXY_URL || PROXY_URL.includes('PASTE_YOUR')) {
      setStatus(false,"⚠ Add your Apps Script URL to index.html");
      return;
    }
    const res = await fetch(PROXY_URL);
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    scoreCache = {};
    const matches = Array.isArray(data) ? data : (data.data||data.games||data.matches||[]);
    matches.forEach(m => {
      const h = apiToOurs(m.homeTeam?.name||m.home_team?.name||m.team1||"");
      const a = apiToOurs(m.awayTeam?.name||m.away_team?.name||m.team2||"");
      if(!h||!a) return;
      const raw = (m.status||"").toUpperCase();
      let status = "SCHEDULED";
      if(raw.includes("FINISH")||raw.includes("FT")||raw==="COMPLETED") status="FINISHED";
      else if(raw.includes("LIVE")||raw.includes("PLAY")||raw.includes("PROGRESS")) status="IN_PLAY";
      else if(raw.includes("HALF")||raw.includes("HT")||raw.includes("PAUSE")) status="PAUSED";
      scoreCache[h+"|"+a] = {
        hs: m.homeScore??m.home_score??m.score1??null,
        as: m.awayScore??m.away_score??m.score2??null,
        status, min: m.minute||m.elapsed||null
      };
    });
    const t=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    setStatus(false,`Updated ${new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`);
    schedulePoll();
    renderAll();
  }catch(e){
    setStatus(false,`Updated ${new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}`);
  }
}

function setStatus(err,msg){
  document.getElementById("status-txt").textContent=msg;
  document.getElementById("rbar-txt").textContent=msg;
  const dot=document.getElementById("status-dot");
  dot.className="dot"+(err?" err":"");
  if(err)dot.style.background="#e63946";
  else dot.style.background="";
  // Check for any live matches
  const anyLive=Object.values(scoreCache).some(s=>["IN_PLAY","PAUSED","LIVE"].includes(s.status));
  if(anyLive){dot.className="dot live";dot.style.background="";}
}

function schedulePoll(){
  if(pollTimer) clearTimeout(pollTimer);
  const anyLive = Object.values(scoreCache).some(s=>["IN_PLAY","PAUSED"].includes(s.status));
  const now = new Date();
  const anyImminent = MATCHES.flatMap(d=>d.matches).some(m=>{
    const dateStr = DAY_DATES[MATCHES.find(d=>d.matches.includes(m))?.day];
    if(!dateStr) return false;
    const utcH = (m.mt[0]+6)%24;
    const ko = new Date(`${dateStr}T${String(utcH).padStart(2,"0")}:${String(m.mt[1]||0).padStart(2,"0")}:00Z`);
    const diff = ko - now;
    return diff>0 && diff<(2*60*60*1000);
  });
  if(!anyLive && !anyImminent) return;
  pollTimer = setTimeout(fetchScores, anyLive ? 30000 : 120000);
}

function getScore(h,a){return scoreCache[h+"|"+a]||null;}

// ── TABS ───────────────────────────────────────────────────────────────────────
function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("fixtures-controls").style.display=tab==="fixtures"?"block":"none";
  document.getElementById("panel-fixtures").style.display=tab==="fixtures"?"block":"none";
  document.getElementById("panel-leaderboard").style.display=tab==="leaderboard"?"block":"none";
  if(tab==="leaderboard")renderLeaderboard();
}

// ── FILTER ─────────────────────────────────────────────────────────────────────
function buildFilters(){
  const f=document.getElementById("filters");
  ["ALL","A","B","C","D","E","F","G","H","I","J","K","L"].forEach(g=>{
    const b=document.createElement("button");
    b.className="fbtn"+(g===activeGroup?" active":"");
    b.textContent=g==="ALL"?"All":`Grp ${g}`;
    b.onclick=()=>{activeGroup=g;document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");renderFixtures();};
    f.appendChild(b);
  });
}

// ── RENDER FIXTURES ────────────────────────────────────────────────────────────
function renderFixtures(){
  const panel=document.getElementById("panel-fixtures");
  panel.innerHTML="";

  // Notice
  const notice=document.createElement("div");
  notice.className="notice";
  notice.innerHTML="✅ Full draw complete — all 14 players allocated across all 48 teams. Times in <strong>BST</strong>.";
  panel.appendChild(notice);

  // Legend
  const legend=document.createElement("div");
  legend.className="legend";
  Object.entries(GC).forEach(([g,c])=>{
    legend.innerHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${c}"></div>Grp ${g}</div>`;
  });
  panel.appendChild(legend);

  MATCHES.forEach(dayObj=>{
    const vis=dayObj.matches.filter(m=>activeGroup==="ALL"||getGroup(m.h)===activeGroup||getGroup(m.a)===activeGroup);
    if(!vis.length)return;

    const allFT=vis.every(m=>{const s=getScore(m.h,m.a);return s&&s.status==="FINISHED";});
    const anyLive=vis.some(m=>{const s=getScore(m.h,m.a);return s&&["IN_PLAY","PAUSED","LIVE"].includes(s.status);});
    const past=isPastDay(dayObj.day);
    const today=isToday(dayObj.day);
    const collapsed=collapsedDays[dayObj.day]||false;

    const section=document.createElement("div");
    section.className="day-section";
    section.id="day-"+dayObj.day.replace(/ /g,"-");

    // Day header
    const hdr=document.createElement("div");
    hdr.className="day-hdr";
    const labelClass=past&&!today?"past":today?"today":"future";
    hdr.innerHTML=`
      <span class="day-label ${labelClass}">${dayObj.day}</span>
      ${anyLive?'<span class="live-badge">LIVE</span>':''}
      ${allFT&&past?'<span class="all-ft">all finished</span>':''}
      <div class="day-divider"></div>
      <span class="day-count">${vis.length}m</span>
      <span class="day-chevron">${collapsed?"▶":"▼"}</span>`;
    hdr.onclick=()=>{
      collapsedDays[dayObj.day]=!collapsedDays[dayObj.day];
      renderFixtures();
    };
    section.appendChild(hdr);

    if(collapsed){
      // Mini score chips
      const row=document.createElement("div");
      row.className="collapsed-row";
      vis.forEach(m=>{
        const s=getScore(m.h,m.a);
        row.innerHTML+=`<div class="mini-score">${FLAGS[m.h]||""} ${s&&s.status==="FINISHED"?s.hs:"–"} · ${s&&s.status==="FINISHED"?s.as:"–"} ${FLAGS[m.a]||""}</div>`;
      });
      section.appendChild(row);
    } else {
      vis.forEach(m=>{
        const g=getGroup(m.h);
        const gc=GC[g]||"#aaa";
        const ownerH=OWNERS[m.h]||null, ownerA=OWNERS[m.a]||null;
        const s=getScore(m.h,m.a);
        const isLive=s&&["IN_PLAY","PAUSED","LIVE"].includes(s.status);
        const isFT=s&&s.status==="FINISHED";
        const bst=mtToBST(m.mt[0],m.mt[1]);

        let centreHTML="";
        if(isLive){
          const min=s.min?`${s.min}'`:s.status==="PAUSED"?"HT":"●";
          centreHTML=`<div class="score live-score"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:3px;vertical-align:middle"></span>${s.hs??0} – ${s.as??0}</div><div class="score-lbl live">${min}</div>`;
        } else if(isFT){
          centreHTML=`<div class="score ft-score">${s.hs} – ${s.as}</div><div class="score-lbl ft">FT</div>`;
        } else {
          centreHTML=`<div class="ko-time">${bst}</div><div class="ko-lbl">BST</div><div class="grp-tag" style="background:${gc}">GRP ${g}</div><div class="venue">${m.venue}</div>`;
        }
        centreHTML+=`<div class="mnum">#${m.n}</div>`;

        const card=document.createElement("div");
        card.className=`match${isLive?" is-live":""}${(ownerH||ownerA)?" has-owner":""}`;
        card.style.borderLeftColor=gc;
        card.innerHTML=`
          <div class="team">
            <div class="team-row"><span class="flag">${FLAGS[m.h]||"🏳"}</span><span class="tname">${m.h}</span></div>
            ${ownerH?`<div class="owner">⚽ ${ownerH}</div>`:""}
          </div>
          <div class="centre">${centreHTML}</div>
          <div class="team right">
            <div class="team-row"><span class="tname">${m.a}</span><span class="flag">${FLAGS[m.a]||"🏳"}</span></div>
            ${ownerA?`<div class="owner">${ownerA} ⚽</div>`:""}
          </div>`;
        section.appendChild(card);
      });
    }
    panel.appendChild(section);
  });
}

// ── RENDER LEADERBOARD ─────────────────────────────────────────────────────────
function renderLeaderboard(){
  const panel=document.getElementById("panel-leaderboard");
  panel.innerHTML="";

  const players=Object.keys(PLAYER_TEAMS);
  if(!players.length){panel.innerHTML='<div class="lb-pending">No player data</div>';return;}

  panel.innerHTML=`<div class="lb-rules">
    <div class="lb-rule"><b style="color:#60a5fa">3 pts</b> per win</div>
    <div class="lb-rule"><b style="color:#34d399">1 pt</b> per goal scored</div>
    <div class="lb-rule"><b style="color:var(--muted)">0 pts</b> draw or loss</div>
  </div>`;

  const standings=players.map(player=>{
    const teams=PLAYER_TEAMS[player]||[];
    let wins=0,goals=0;
    MATCHES.forEach(d=>d.matches.forEach(m=>{
      const s=getScore(m.h,m.a);
      if(!s||s.status!=="FINISHED")return;
      const hg=s.hs??0,ag=s.as??0;
      if(teams.includes(m.h)){goals+=hg;if(hg>ag)wins++;}
      if(teams.includes(m.a)){goals+=ag;if(ag>hg)wins++;}
    }));
    return{player,teams,wins,goals,total:wins*3+goals};
  }).sort((a,b)=>b.total-a.total||b.wins-a.wins||b.goals-a.goals);

  const maxPts=Math.max(standings[0]?.total||0,1);
  const medals=["#FFD700","#C0C0C0","#CD7F32"];

  const wrap=document.createElement("div");
  wrap.style.cssText="background:#0a0e18;border:1px solid var(--border);border-radius:10px;overflow:hidden;";

  // Header
  wrap.innerHTML=`<table class="lb-table"><thead><tr>
    <th>#</th><th>Player</th>
    <th class="r" style="color:#60a5fa">Wins</th>
    <th class="r" style="color:#34d399">Goals</th>
    <th class="r" style="color:var(--gold)">Pts</th>
  </tr></thead><tbody id="lb-body"></tbody></table>`;
  panel.appendChild(wrap);

  const tbody=document.getElementById("lb-body");
  standings.forEach((s,i)=>{
    const pct=maxPts>0?(s.total/maxPts)*100:0;
    const posCol=i<3?medals[i]:"#2a3a4a";
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="lb-pos" style="color:${posCol};font-weight:${i<3?"700":"400"}">${i+1}</td>
      <td class="lb-player-cell">
        <div class="lb-pname">${s.player}</div>
        <div class="lb-chips">${s.teams.map(t=>`<span class="lb-chip">${FLAGS[t]||""} ${t}</span>`).join("")}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
      </td>
      <td class="lb-num w">${s.wins}</td>
      <td class="lb-num g">${s.goals}</td>
      <td class="lb-num p">${s.total}</td>`;
    tbody.appendChild(tr);
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────────
buildFilters();
renderFixtures();
fetchScores();
</script>
